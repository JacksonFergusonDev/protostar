name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-n-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7
        with:
          python-version: "3.14"

      - name: Build distribution
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  update-homebrew:
    name: Update Homebrew tap formula + resources
    needs: build-n-publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out Homebrew Tap
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          repository: JacksonFergusonDev/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@ac2ec1ccabf33716b2fe5f4d467e250296951780

      - name: Tap the repository
        run: brew tap JacksonFergusonDev/homebrew-tap ./homebrew-tap

      - name: Bump formula URL/SHA and sync Python resources
        working-directory: homebrew-tap
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VER="${TAG#v}" # e.g. 0.3.0
          FORMULA="Formula/protostar.rb"

          # Define the path to Homebrew's internal clone of the tap
          BREW_TAP_DIR="$(brew --repository jacksonfergusondev/homebrew-tap)"
          BREW_FORMULA="$BREW_TAP_DIR/$FORMULA"

          # Wait until the just-published version is visible on PyPI
          FOUND=0
          for i in $(seq 1 60); do
            if curl -fsS "https://pypi.org/pypi/protostar/${VER}/json" >/dev/null; then
              FOUND=1
              break
            fi
            sleep 2
          done

          if [ "$FOUND" -ne 1 ]; then
            echo "Timed out waiting for protostar ${VER} on PyPI"
            exit 1
          fi

          # Fetch PyPI metadata
          PYPI_JSON="$(curl -fsS https://pypi.org/pypi/protostar/${VER}/json)"

          NEW_URL="$(echo "$PYPI_JSON" | jq -r '.urls[] | select(.packagetype=="sdist") | .url')"
          NEW_SHA="$(echo "$PYPI_JSON" | jq -r '.urls[] | select(.packagetype=="sdist") | .digests.sha256')"

          if [ -z "$NEW_URL" ] || [ -z "$NEW_SHA" ]; then
            echo "Failed to retrieve sdist info from PyPI"
            exit 1
          fi

          # Update formula in HOMEBREW'S internal directory
          sed -i "s|^  url \".*\"|  url \"${NEW_URL}\"|" "$BREW_FORMULA"
          sed -i "s|^  sha256 \".*\"|  sha256 \"${NEW_SHA}\"|" "$BREW_FORMULA"

          # Regenerate the dependency resource blocks (modifies Homebrew's internal copy)
          brew update-python-resources \
          --install-dependencies \
          --package-name protostar \
          --version "${VER}" \
          jacksonfergusondev/homebrew-tap/protostar

          # Copy the fully updated formula back to the local GitHub Action workspace
          cp "$BREW_FORMULA" "$FORMULA"

          # Commit + push if anything changed
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FORMULA"

          if git diff --cached --quiet; then
            echo "No formula changes to commit."
            exit 0
          fi

          brew audit --strict --online jacksonfergusondev/homebrew-tap/protostar

          git commit -m "chore: bump protostar to ${TAG} and sync python resources"
          git push
