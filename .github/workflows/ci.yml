name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Test on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.14"]

    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

    - name: Install uv
      uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Lint with Ruff
      run: |
        uv run ruff check .
        uv run ruff format --check .

    - name: Lint Markdown
      run: npx --yes markdownlint-cli "**/*.md" --ignore ".venv"

    - name: Type check with Mypy
      run: uv run mypy .

    - name: Run tests with coverage # (for Codecov)
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14' }}
      run: uv run pytest --cov --cov-report=xml --junitxml=junit.xml -o junit_family=legacy

    - name: Run tests # (without coverage to avoid overhead on non-Codecov runs)
      if: ${{ !(matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14') }}
      run: uv run pytest

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14'
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage.xml
        disable_search: true
        name: coverage-ubuntu-py314
        fail_ci_if_error: true

    - name: Upload test analytics to Codecov
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14' && !cancelled() }}
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: junit.xml
        disable_search: true
        report_type: test_results
        name: test-results-ubuntu-py314
