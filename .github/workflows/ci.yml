name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Test on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.14"]

    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

    - name: Install uv
      uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Lint with Ruff
      run: |
        uv run ruff check .
        uv run ruff format --check .

    - name: Lint Markdown
      run: npx --yes markdownlint-cli "**/*.md" --ignore ".venv"

    - name: Type check with Mypy
      run: uv run mypy .

    - name: Run tests with coverage # (for Codecov)
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14' }}
      run: uv run pytest --cov --cov-report=xml --junitxml=junit.xml -o junit_family=legacy

    - name: Run tests # (without coverage to avoid overhead on non-Codecov runs)
      if: ${{ !(matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14') }}
      run: uv run pytest

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14'
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage.xml
        disable_search: true
        name: coverage-ubuntu-py314
        fail_ci_if_error: true

    - name: Upload test analytics to Codecov
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14' && !cancelled() }}
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: junit.xml
        disable_search: true
        report_type: test_results
        name: test-results-ubuntu-py314

  benchmark-gate:
    name: Benchmark Regression Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

    - name: Install uv
      uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"
        python-version: "3.14"

    - name: Install hyperfine
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y hyperfine

    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Run benchmarks
      run: make test-benchmark

    - name: Convert hyperfine output for benchmark action
      run: |
        python << 'PY'
        import json
        data = json.load(open("benchmark.json"))
        mean_ms = data["results"][0]["mean"] * 1000
        converted = [{
            "name": "Protostar Initialization Latency",
            "unit": "ms",
            "value": round(mean_ms, 2)
        }]
        json.dump(converted, open("benchmark-gh.json", "w"))
        PY

    - name: Evaluate regression threshold
      uses: benchmark-action/github-action-benchmark@v1
      with:
        name: Protostar Initialization Latency
        tool: 'customSmallerIsBetter'
        output-file-path: benchmark-gh.json
        gh-pages-branch: 'performance-benchmarks'
        benchmark-data-dir-path: './'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        fail-on-alert: true
        alert-threshold: '150%'
        comment-on-alert: true
        auto-push: false
