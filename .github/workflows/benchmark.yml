name: Performance Benchmarks

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    name: Execute & Evaluate
    # Condition: Run on main branch pushes, OR if the PR has the specific label
    if: >
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'run-benchmark')

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

    - name: Install uv
      uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"
        python-version: "3.14"

    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Run benchmarks
      run: make test-benchmark

    - name: Generate Latency Badge Data
      run: |
        # Extract the mean value from the latest benchmark using python
        MEAN=$(python3 -c "import json; print(json.load(open('benchmark.json'))['benchmarks'][0]['stats']['mean'])")
        # Convert to ms and round to 2 decimal places
        LATENCY=$(python3 -c "print(round($MEAN * 1000, 2))")
        echo "{\"schemaVersion\": 1, \"label\": \"latency\", \"message\": \"$LATENCY ms\", \"color\": \"blue\"}" > /tmp/latency-badge.json

    - name: Store benchmark result
      uses: benchmark-action/github-action-benchmark@v1
      with:
        name: Protostar Initialization Latency
        tool: 'pytest'
        output-file-path: benchmark.json
        gh-pages-branch: 'performance-benchmarks'
        benchmark-data-dir-path: './'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        fail-on-alert: true
        alert-threshold: '300%'
        comment-on-alert: true
        auto-push: ${{ github.event_name == 'push' }}

    - name: Push latency badge
      if: github.event_name == 'push'
      run: |
        git fetch origin performance-benchmarks
        git checkout performance-benchmarks
        cp /tmp/latency-badge.json latency-badge.json
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add latency-badge.json
        git diff --cached --quiet || git commit -m "chore: update latency badge [skip ci]"
        git push origin performance-benchmarks
