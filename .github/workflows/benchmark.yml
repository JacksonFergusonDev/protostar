name: Performance Benchmarks

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    name: Execute & Evaluate
    # Condition: Run on main branch pushes, OR if the PR has the specific label
    if: >
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'run-benchmark')

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

    - name: Install uv
      uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"
        python-version: "3.14"

    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Run benchmarks
      run: make test-benchmark

    - name: Store benchmark result
      uses: benchmark-action/github-action-benchmark@v1
      with:
        name: Protostar Initialization Latency
        tool: 'pytest'
        output-file-path: benchmark.json
        gh-pages-branch: 'performance-benchmarks'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        fail-on-alert: true
        alert-threshold: '300%'
        comment-on-alert: true
        auto-push: ${{ github.event_name == 'push' }}
